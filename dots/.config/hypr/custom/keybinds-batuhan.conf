# Batuhan legacy keybind profile.
# Kept in a dedicated file so upstream keybind template updates stay easy to merge.

$mainMod = SUPER
$filemanager = thunar
$applauncher = wofi --show drun
$browser = google-chrome-stable
$whatsapp = /opt/google/chrome/google-chrome --profile-directory=Default --app-id=hnpfjngllnobngcgfapefoaidbinmjnm
$terminal = alacritty

$shot-region = bash -lc "mkdir -p \"$HOME/Pictures/Screenshots\" && grimblast --freeze --cursor --scale 1 copysave area \"$HOME/Pictures/Screenshots/region-$(date +%Y-%m-%d_%H-%M-%S).png\""
$shot-window = bash -lc "mkdir -p \"$HOME/Pictures/Screenshots\" && grimblast --freeze --cursor --scale 1 copysave active \"$HOME/Pictures/Screenshots/window-$(date +%Y-%m-%d_%H-%M-%S).png\""
$shot-screen = bash -lc "mkdir -p \"$HOME/Pictures/Screenshots\" && grimblast --freeze --cursor --scale 1 copysave output \"$HOME/Pictures/Screenshots/screen-$(date +%Y-%m-%d_%H-%M-%S).png\""

# Remove defaults on keys overridden below
unbind = $mainMod, RETURN
unbind = $mainMod, E
unbind = $mainMod, B
unbind = $mainMod, W
unbind = $mainMod, X
unbind = $mainMod, C
unbind = $mainMod SHIFT, C
unbind = $mainMod, H
unbind = $mainMod, G
unbind = $mainMod, P
unbind = $mainMod, T
unbind = $mainMod, A
unbind = $mainMod, O
unbind = $mainMod, Y
unbind = $mainMod, N
unbind = $mainMod SHIFT, V
unbind = $mainMod CTRL, S
unbind = $mainMod, Q
unbind = $mainMod SHIFT, M
unbind = $mainMod, V
unbind = $mainMod, SPACE
unbind = $mainMod, F
unbind = $mainMod SHIFT, Y
unbind = $mainMod, J
unbind = $mainMod SHIFT, Z
unbind = $mainMod, K
unbind = $mainMod CTRL, K
unbind = $mainMod, Tab
unbind = $mainMod SHIFT, G
unbind = $mainMod ALT, G
unbind = $mainMod, COMMA
unbind = $mainMod, PERIOD
unbind = $mainMod, slash
unbind = $mainMod, mouse_down
unbind = $mainMod, mouse_up
unbind = $mainMod, minus
unbind = $mainMod, equal
unbind = $mainMod, F1
unbind = $mainMod ALT SHIFT, F1
unbind = , Print
unbind = CTRL, S
unbind = ALT, S
unbind = , XF86AudioRaiseVolume
unbind = , XF86AudioLowerVolume
unbind = , XF86AudioMute
unbind = , XF86AudioPlay
unbind = , XF86AudioNext
unbind = , XF86AudioPrev
unbind = , XF86MonBrightnessUp
unbind = , XF86MonBrightnessDown
unbind = $mainMod, L
unbind = $mainMod SHIFT, O

# Legacy apps
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $filemanager
bind = $mainMod, B, exec, $browser
bind = $mainMod, X, exec, gtk-launch twitter
bind = $mainMod, W, exec, $whatsapp
bind = $mainMod, C, exec, gtk-launch chatgpt
bind = $mainMod SHIFT, C, exec, gtk-launch cursor
bind = $mainMod, H, global, quickshell:cheatsheetToggle
bind = $mainMod, G, exec, gtk-launch google-gemini
bind = $mainMod, P, exec, gtk-launch perplexity
bind = $mainMod, T, exec, gtk-launch telegram-web
bind = $mainMod, A, exec, gtk-launch google-ai-studio
bind = $mainMod, O, exec, gtk-launch obsidian
bind = $mainMod, Y, exec, gtk-launch youtube
bind = $mainMod, N, exec, gtk-launch netflix
bind = $mainMod SHIFT, V, exec, code
bind = $mainMod CTRL, S, exec, ~/.config/quickshell/$qsConfig/scripts/videos/record.sh --fullscreen --sound
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, M, exec, loginctl terminate-user ""
bind = $mainMod, V, togglefloating
bind = $mainMod, SPACE, exec, $applauncher
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, Y, pin
bind = $mainMod, J, changegroupactive, f
bind = $mainMod SHIFT, Z, exec, zed

# Workspace navigation
bind = $mainMod, COMMA, workspace, e-1
bind = $mainMod, PERIOD, workspace, e+1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, slash, workspace, previous
bind = $mainMod, minus, movetoworkspace, special
bind = $mainMod, equal, togglespecialworkspace, special
bind = $mainMod, F1, togglespecialworkspace, scratchpad
bind = $mainMod ALT SHIFT, F1, movetoworkspacesilent, special:scratchpad

# Utilities
bind = , Print, exec, $shot-region
bind = CTRL, S, exec, $shot-window
bind = ALT, S, exec, $shot-screen
bind = $mainMod, K, togglegroup
bind = $mainMod CTRL, K, exec, hyprctl switchxkblayout all next
bind = $mainMod, Tab, changegroupactive, f
bind = $mainMod SHIFT, G, exec, hyprctl --batch "keyword general:gaps_out 5;keyword general:gaps_in 3"
bind = $mainMod ALT, G, exec, hyprctl --batch "keyword general:gaps_out 0;keyword general:gaps_in 0"

# Media and screen controls
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5% && pactl get-sink-volume @DEFAULT_SINK@ | grep -oP '\\d+(?=%)' | awk '{if($1>100) system("pactl set-sink-volume @DEFAULT_SINK@ 100%")}' && pactl get-sink-volume @DEFAULT_SINK@ | grep -oP '\\d+(?=%)' | awk '{print $1}' | head -1 > /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5% && pactl get-sink-volume @DEFAULT_SINK@ | grep -oP '\\d+(?=%)' | awk '{print $1}' | head -1 > /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob
binde = , XF86AudioMute, exec, amixer sset Master toggle | sed -En '/\\[on\\]/ s/.*\\[([0-9]+)%\\].*/\\1/ p; /\\[off\\]/ s/.*/0/p' | head -1 > /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
binde = , XF86MonBrightnessUp, exec, brightnessctl s +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bind = $mainMod, L, exec, swaylock-fancy -e -K -p 10 -f Hack-Regular
bind = $mainMod SHIFT, O, exec, killall -SIGUSR2 waybar
